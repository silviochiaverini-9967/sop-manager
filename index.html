<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOP Manager – Sala Infusioni & Sciroppi</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh;user-select:none;-webkit-user-select:none}
  :root{--blue:#2563eb;--green:#16a34a;--gray:#64748b;--red:#dc2626}
  .login-overlay{display:flex;position:fixed;inset:0;background:linear-gradient(135deg,#1e3a5f,#2563eb);z-index:200;align-items:center;justify-content:center}
  .login-box{background:#fff;border-radius:20px;padding:36px 40px;width:min(400px,90vw);text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)}
  .login-box h2{font-size:1.2rem;font-weight:700;color:#1e3a5f;margin-bottom:6px}
  .login-box p{font-size:.85rem;color:var(--gray);margin-bottom:24px}
  .role-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
  .role-btn{padding:16px;border:2px solid #e2e8f0;border-radius:12px;cursor:pointer;background:#fff;font-size:.9rem;font-weight:600;transition:all .2s}
  .role-btn:hover{border-color:var(--blue);color:var(--blue)}
  .role-btn .icon{font-size:1.8rem;display:block;margin-bottom:6px}
  .pin-area{display:none;margin-top:4px}
  .pin-area input{width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:8px;font-size:1.1rem;text-align:center;letter-spacing:6px;margin-bottom:10px}
  .pin-area input:focus{outline:none;border-color:var(--blue)}
  .btn-pin{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700}
  .pin-error{color:var(--red);font-size:.82rem;margin-top:4px;display:none}
  .role-badge{display:inline-block;padding:3px 12px;border-radius:10px;font-size:.75rem;font-weight:700}
  .role-badge.admin{background:#dbeafe;color:#1d4ed8}
  .role-badge.operator{background:#dcfce7;color:#15803d}
  header{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .header-left{display:flex;flex-direction:column;gap:3px}
  header h1{font-size:1.3rem;font-weight:700}
  .sop-acronym .big{font-size:1.4em;font-weight:800}
  .sop-acronym .small{font-size:0.7em;font-weight:400;opacity:.9}
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .btn-logout{padding:4px 10px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:6px;cursor:pointer;font-size:.75rem}
  nav{display:flex;gap:8px;padding:14px 28px;background:#fff;border-bottom:1px solid #e2e8f0;flex-wrap:wrap;align-items:center}
  nav button{padding:8px 18px;border:none;border-radius:20px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}
  nav button.active{background:var(--blue);color:#fff}
  nav button:not(.active){background:#f1f5f9;color:#475569}
  nav button:not(.active):hover{background:#e2e8f0}
  nav button:disabled{opacity:.4;cursor:not-allowed}
  main{padding:24px 28px;max-width:1100px;margin:0 auto}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
  .stat-card{background:#fff;border-radius:12px;padding:18px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .stat-card .num{font-size:2rem;font-weight:700;color:var(--blue)}
  .stat-card .lbl{font-size:.8rem;color:var(--gray);margin-top:4px}
  .area-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .area-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .area-card h3{font-size:1rem;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e2e8f0}
  .area-card.infusioni h3{border-color:#2563eb;color:#1e3a5f}
  .area-card.sciroppi h3{border-color:#16a34a;color:#14532d}
  .proc-mini{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f1f5f9;cursor:pointer}
  .proc-mini:hover{background:#f8fafc;margin:0 -8px;padding:7px 8px;border-radius:6px}
  .badge{font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:600}
  .badge.approvata{background:#dcfce7;color:#16a34a}
  .badge.bozza{background:#fef9c3;color:#a16207}
  .badge.obsoleta{background:#fee2e2;color:#dc2626}
  .toolbar{display:flex;gap:10px;margin-bottom:16px;align-items:center}
  .toolbar input{flex:1;padding:9px 14px;border:1px solid #cbd5e1;border-radius:8px;font-size:.9rem}
  .toolbar select{padding:9px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:.85rem;background:#fff}
  .btn-new{padding:9px 18px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85rem}
  .proc-table{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .proc-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:10px;padding:12px 16px;border-bottom:1px solid #f1f5f9;align-items:center}
  .proc-row.header{background:#f8fafc;font-size:.78rem;font-weight:700;color:var(--gray);text-transform:uppercase}
  .proc-row:not(.header):hover{background:#f8fafc;cursor:pointer}
  .proc-title{font-weight:600;font-size:.88rem}
  .proc-date{font-size:.8rem;color:var(--gray)}
  .btn-icon{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;font-size:1rem}
  .btn-icon:hover{background:#e2e8f0}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:16px;padding:28px;width:min(680px,95vw);max-height:90vh;overflow-y:auto;position:relative}
  .modal h2{font-size:1.15rem;font-weight:700;margin-bottom:18px;color:#1e3a5f}
  .form-group{margin-bottom:14px}
  .form-group label{display:block;font-size:.82rem;font-weight:600;color:var(--gray);margin-bottom:5px}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:.88rem;font-family:inherit}
  .form-group textarea{min-height:90px;resize:vertical}
  .btn-ai{width:100%;padding:11px;background:linear-gradient(135deg,#6366f1,#2563eb);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:.9rem;margin-bottom:10px}
  .btn-ai:disabled{opacity:.5;cursor:not-allowed}
  .ai-result{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;font-size:.83rem;line-height:1.7;margin-bottom:14px;display:none}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
  .btn-save{padding:10px 22px;background:var(--green);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700}
  .btn-cancel{padding:10px 16px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;cursor:pointer;font-weight:600}
  .btn-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--gray)}
  .btn-chiudi{padding:9px 16px;background:#dc2626;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .sop-content{font-size:.88rem;line-height:1.8;background:#f8fafc;border-radius:8px;padding:16px}
  .detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
  .detail-header h2{font-size:1.2rem;font-weight:700;color:#1e3a5f;max-width:80%}
  .detail-meta{display:flex;gap:16px;margin-bottom:18px;flex-wrap:wrap}
  .detail-meta span{font-size:.82rem;color:var(--gray)}
  .detail-meta strong{color:#1a202c}
  .detail-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
  .btn-print{padding:9px 18px;background:#1e3a5f;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600}
  .btn-edit{padding:9px 16px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;cursor:pointer;font-weight:600}
  .btn-del{padding:9px 16px;background:#fee2e2;color:#dc2626;border:none;border-radius:8px;cursor:pointer;font-weight:600}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e3a5f;color:#fff;padding:10px 24px;border-radius:10px;font-size:.88rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}
  .print-header{display:none}
  @media print{
    header,nav,.toolbar,.modal-actions,.detail-actions,.toast,.login-overlay,.btn-close,.btn-chiudi,#mainContent{display:none!important}
    body{background:#fff;overflow:visible!important;height:auto!important}
    .overlay.open{position:static;background:none;display:block!important;overflow:visible!important;height:auto!important}
    .modal{position:static;max-height:none!important;overflow:visible!important;width:100%;box-shadow:none;padding:0;border-radius:0;height:auto!important}
    .print-header{display:none!important}
    .sop-content{background:#fff;border:1px solid #ccc;overflow:visible!important;height:auto!important;page-break-inside:auto}
    #detailContent{overflow:visible!important;height:auto!important}
    *{overflow:visible!important}
  }
  @media(max-width:600px){
    .area-cards{grid-template-columns:1fr}
    .proc-row{grid-template-columns:1fr auto}
    .proc-row .proc-area,.proc-row .proc-date,.proc-row .proc-tipo{display:none}
    main{padding:14px}
  }
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>📋 SOP Manager</h2>
    <p>Sala Infusioni & Sciroppi</p>
    <div class="role-btns">
      <button class="role-btn" onclick="loginAs('operator')"><span class="icon">👷</span>Operatore</button>
      <button class="role-btn" onclick="showPin()"><span class="icon">🔐</span>Amministratore</button>
    </div>
    <div class="pin-area" id="pinArea">
      <input type="password" id="pinInput" maxlength="6" placeholder="• • • • • •" onkeydown="if(event.key==='Enter')checkPin()">
      <button class="btn-pin" onclick="checkPin()">Accedi</button>
      <div class="pin-error" id="pinError">PIN errato. Riprova.</div>
    </div>
  </div>
</div>
<header>
  <div class="header-left">
    <h1 class="sop-acronym">📋 <span class="big">S</span><span class="small">tandard </span><span class="big">O</span><span class="small">perating </span><span class="big">P</span><span class="small">rocedures</span></h1>
    <span style="font-size:.75rem;opacity:.7">Sala Infusioni & Sciroppi</span>
  </div>
  <div class="header-right">
    <span id="hdrDate" style="font-size:.75rem;opacity:.8"></span>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="role-badge" id="roleBadge"></span>
      <button class="btn-logout" onclick="logout()">⇤ Esci</button>
    </div>
  </div>
</header>
<nav>
  <button class="active" onclick="showPage('dashboard')">🏠 Dashboard</button>
  <button onclick="showPage('procedure')">📄 Procedure</button>
  <button id="btnNuova" onclick="openNewModal()" disabled>➕ Nuova SOP</button>
</nav>
<main id="mainContent"></main>
<div class="overlay" id="sopModal">
  <div class="modal">
    <button class="btn-close" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Nuova Procedura Operativa</h2>
    <div class="form-group"><label>Titolo *</label><input id="fTitle" placeholder="es. Cambio filtri a sacco sala infusioni"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group"><label>Area *</label><select id="fArea"><option>Sala Infusioni</option><option>Sala Sciroppi</option><option value="Comune (entrambe)">Comune (entrambe)</option></select></div>
      <div class="form-group"><label>Tipo</label><select id="fTipo"><option>Cambio componente</option><option>Avvio produzione</option><option>Ripartenza</option><option>CIP / Pulizia</option><option>Manutenzione</option><option>Controllo qualità</option><option>Altro</option></select></div>
    </div>
    <div class="form-group"><label>Frequenza</label><select id="fFreq"><option>Ogni turno</option><option>Giornaliera</option><option>Settimanale</option><option>Mensile</option><option>A ogni cambio formato</option><option>A ogni cambio produzione</option><option>Su richiesta / Occasionale</option><option>Straordinaria</option></select></div>
    <div class="form-group"><label>Descrivi l'operazione</label><textarea id="fDesc" placeholder="Descrivi cosa fa l'operatore..."></textarea></div>
    <button class="btn-ai" id="btnGenerate" onclick="generateSOP()">✨ Genera SOP con AI</button>
    <div class="ai-result" id="aiResult"></div>
    <div class="form-group"><label>Stato</label><select id="fStato"><option value="bozza">Bozza</option><option value="approvata">Approvata</option><option value="obsoleta">Obsoleta</option></select></div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Annulla</button><button class="btn-save" onclick="saveSOP()">💾 Salva</button></div>
  </div>
</div>
<div class="overlay" id="detailModal">
  <div class="modal"><button class="btn-close" onclick="closeDetail()">✕</button><div id="detailContent"></div></div>
</div>
<script>
const ADMIN_PIN = "1234";
const CREATOR = "Silvio Chiaverini";

const SOP_DATA = [
  {
    id:'sop_001', title:'Cambio filtri a sacco', area:'Sala Infusioni', tipo:'Cambio componente',
    freq:'A ogni intasamento o cambio produzione', stato:'approvata', date:'14/05/2026', creator:'Silvio Chiaverini',
    content: "## 1. SCOPO\nDefinire la procedura corretta per la sostituzione dei filtri a sacco sulla linea di filtrazione dell'estratto di tè, garantendo la qualità del prodotto e la sicurezza dell'operatore.\n\n## 2. CAMPO DI APPLICAZIONE\nSala Infusioni — linea di filtrazione estratto di tè. Si applica ad ogni sostituzione programmata o straordinaria dei filtri a sacco.\n\n## 3. RIFERIMENTI\nFrequenza: a ogni intasamento o cambio produzione, oppure quando la pressione differenziale supera **1,5 bar** (il sistema di gestione darà allarme).\n\n## 4. DPI RICHIESTI\n**Guanti in nitrile** resistenti al calore\n**Occhiali di protezione**\nCalzature antiscivolo\n\n## 5. MATERIALI E ATTREZZATURE\nFiltri a sacco nuovi (misura e micronaggio conformi alla ricetta in produzione)\nRegistro delle sostituzioni\n\n## 6. PROCEDURA OPERATIVA\n\n### 6.1 Preparazione\n1. Verificare di avere a disposizione i filtri a sacco del **micronaggio corretto**.\n\n### 6.2 Arresto e messa in sicurezza\n2. **Cambiare campana in lavoro** mettendo prima in pulizia la campana in preallarme, poi in lavoro l'altra.\n3. **Aspettare che la procedura sia conclusa dal sistema** e all'accensione della **luce verde** aprire la porta del filtro.\n\n### 6.3 Sostituzione\n8. Aprire il coperchio del portafiltro svitando i bulloni in sequenza crociata.\n9. Estrarre i filtri esausti con cautela e riporli **nella rastrelliera**.\n10. **Ispezionare il cestello interno**: verificare assenza di rotture o depositi anomali.\n11. **Lavare i filtri con l'idropulitrice.**\n12. Inserire i filtri lavati assicurandosi che siano **correttamente posizionati e ancorati** al cestello.\n13. Richiudere il coperchio serrando i bulloni in sequenza crociata a **coppia uniforme**.\n\n### 6.4 Riavvio\n14. **Chiudere la porta** ed eseguire la sequenza di tasti per bloccarla.\n15. Andare sul **PC di controllo impianto** e riportare in funzione i filtri da **Richiesta Pulizia**.\n\n## 7. ANOMALIE E AZIONI CORRETTIVE\n**Perdita dal portafiltro** → fermare la pompa, verificare la tenuta del coperchio e riserrare i bulloni.\n**Filtro danneggiato o rotto** → sostituire immediatamente, segnalare al responsabile qualità, valutare impatto sul lotto.\n**Pressione differenziale continuativamente bassa** → verificare corretto posizionamento del sacco, controllare che non ci siano filtri bucati o mal posizionati nel cestello.\n\n## 8. NOTE DI SICUREZZA\nI filtri esausti vanno smaltiti come **rifiuto speciale** secondo le procedure aziendali.\nRegistrare ogni sostituzione sul **registro manutenzione** con ora, operatore e tipo di filtro installato."
  },
  {
    id:'sop_002', title:'CANS - Fornitura Prodotto da Sala Sciroppi', area:'Comune (entrambe)', tipo:'Avvio produzione',
    freq:'A ogni cambio produzione', stato:'approvata', date:'26/06/2026', creator:'Silvio Chiaverini',
    content: "## 1. SCOPO\nDefinire la sequenza operativa corretta per avviare la fornitura di prodotto dalla Sala Sciroppi alla linea CANS (Riempitrice Lattine), tramite il sistema di controllo impianto.\n\n## 2. CAMPO DI APPLICAZIONE\nSala Sciroppi e Sala Infusioni — pannello di controllo impianto. Si applica ad ogni avvio o cambio produzione sulla linea CANS.\n\n## 3. RIFERIMENTI\nFrequenza: **a ogni cambio produzione** o riavvio linea CANS.\n\n## 4. DPI RICHIESTI\nNessun DPI specifico richiesto (operazione su pannello di controllo).\n\n## 5. MATERIALI E ATTREZZATURE\nAccesso al **PC di controllo impianto** in Sala Sciroppi.\n\n## 6. PROCEDURA OPERATIVA\n\n### 6.1 Impostazione linea di scarico\n1. Dal **Menu Principale** → **Aromatizzatori** → **Cicli** → in basso a sinistra selezionare **\"Linea Scarico 3\"** → **Riempitrice Lattine**.\n\n### 6.2 Messa in produzione\n2. Probabilmente la si trova in **Lavaggio** → Mettere in **Produzione**.\n\n### 6.3 Configurazione Serbatoio Ferrero\n3. **Menu Principale** → **Succhi e Ferrero** → **Cicli** → tutto a destra selezionare **Serbatoio Ferrero** → Vedi punto 2 → **STOP** → **PRODUZIONE**.\n\n### 6.4 Impostazione funzione scarico\n4. Nella prima combo in alto **FUNZIONE** → selezionare **Scarico Linea Asettica** ma **SENZA PREMERE START**.\n\n### 6.5 Attivazione THE FERRERO BIBITA\n5. **Menu Principale** → **Aromatizzatori** → in basso cliccare su **THE FERRERO BIBITA** → attendere che **diventi verde**.\n\n### 6.6 Collegamento linea Ferrero a Manifold\n6. **Impianto Succhi Ferrero** → in basso a destra → **Linea Ferrero a Manifold** → mettere in **Produzione**.\n\n### 6.7 Avvio scarico lattine\n7. **Serbatoio Ferrero** → **Funzione** → **Scarico Lattine** → **START**.\n\n## 7. ANOMALIE E AZIONI CORRETTIVE\n**THE FERRERO BIBITA non diventa verde** → verificare che il serbatoio sia carico e che non ci siano allarmi attivi sul pannello.\n**Prodotto non arriva in linea CANS** → verificare che tutti i passaggi siano stati eseguiti nell'ordine corretto, controllare lo stato delle valvole sul Manifold.\n**Allarme sul Serbatoio Ferrero** → contattare il capoturno e verificare livello e parametri del serbatoio.\n\n## 8. NOTE DI SICUREZZA\n⚠️ **Al punto 6.4, NON premere START** fino a quando non sono stati completati i passaggi successivi (6.5, 6.6, 6.7).\nSeguire rigorosamente l'ordine dei passaggi per evitare invii di prodotto errati alla linea."
  },
  {
    id:'sop_003', title:'TUBO FERRERO - Lavaggio', area:'Comune (entrambe)', tipo:'CIP / Pulizia',
    freq:'A ogni cambio produzione', stato:'approvata', date:'26/06/2026', creator:'Silvio Chiaverini',
    content: "## 1. SCOPO\nDefinire la sequenza operativa corretta per eseguire il lavaggio del Tubo Ferrero a Linee tramite il sistema CIP2.\n\n## 2. CAMPO DI APPLICAZIONE\nSala Sciroppi e Sala Infusioni — PC di controllo impianto. Si applica ad ogni lavaggio programmato del Tubo Ferrero.\n\n## 3. RIFERIMENTI\nFrequenza: **a ogni cambio produzione** o secondo piano di sanificazione.\n\n## 4. DPI RICHIESTI\n**Guanti in nitrile**\n**Occhiali di protezione**\n\n## 5. MATERIALI E ATTREZZATURE\nAccesso al **PC sala sciroppi**.\n\n## 6. PROCEDURA OPERATIVA\n\n### 6.1 Verifica disponibilità CIP2\n1. Andare sul PC sala sciroppi → **Menu Principale** → **IMPIANTO LAVAGGIO DOPPIO** → Assicurarsi che il tasto **START del CIP2 NON sia VERDE** (se lo è, c'è un altro lavaggio in corso e **bisogna attendere**).\n\n### 6.2 Impostazione lavaggio\n2. Se **NON VERDE** → **Cicli** → su **LAVAGGIO SELEZIONATO** impostare **TUBO FERRERO A LINEE**.\n\n### 6.3 Selezione ricetta\n3. **Nome set di dati** → selezionare **RISC+SODA TUBO FERRERO A LINEE**.\n\n### 6.4 Salvataggio ricetta\n4. Selezionare **icona in basso a destra** per salvare la ricetta del lavaggio.\n\n### 6.5 Impostazione Serbatoio Ferrero in lavaggio\n5. **Menu Principale** → **Impianti Succhi e Ferrero** → **Cicli** (in alto a destra) → **Serbatoio Ferrero** (in alto a destra) → impostare su **Lavaggio** (in alto a destra).\n\n### 6.6 Collegamento Tubo\n6. Di fronte alla botte esterna 204 → sulla Piastra collegare il tubo su **MANDATA FERRERO**.\n\n### 6.7 Avvio CIP2\n7. Tornare sul PC sala sciroppi → **Menu Principale** → **IMPIANTO LAVAGGIO DOPPIO** → **START su CIP2**.\n\n## 7. ANOMALIE E AZIONI CORRETTIVE\n**CIP2 già in uso (START verde)** → attendere il completamento del lavaggio in corso prima di procedere.\n**Lavaggio non parte dopo START** → verificare che la ricetta sia stata salvata correttamente (punto 6.4) e che il Serbatoio Ferrero sia impostato su Lavaggio (punto 6.5).\n**Allarme durante il lavaggio** → verificare i parametri CIP sul pannello.\n\n## 8. NOTE DI SICUREZZA\n⚠️ **NON avviare il CIP2 se il tasto START è già verde** — significa che un altro lavaggio è in corso.\nVerificare sempre che il Serbatoio Ferrero sia impostato su **Lavaggio** prima di avviare il CIP2."
  },
  {
    id:'sop_004', title:'RECUPERO SCIROPPO DA TANK', area:'Sala Infusioni', tipo:'Ripartenza',
    freq:'Su richiesta / Occasionale', stato:'approvata', date:'26/06/2026', creator:'Silvio Chiaverini',
    content: "## 1. SCOPO\nDefinire la procedura corretta per il recupero dello sciroppo dal Tank di Recupero in Sala Infusioni.\n\n## 2. CAMPO DI APPLICAZIONE\nSala Infusioni — Tank di Recupero e PC di controllo impianto.\n\n## 3. RIFERIMENTI\nFrequenza: **su richiesta**, quando è necessario recuperare lo sciroppo dal Tank.\n\n## 4. DPI RICHIESTI\n**Guanti in nitrile**\nCalzature antiscivolo\n\n## 5. MATERIALI E ATTREZZATURE\nTank di Recupero\nTubo rosso (con scritta \"Recupero\")\nAccesso al **PC di controllo impianto**\n\n## 6. PROCEDURA OPERATIVA\n\n### 6.1 Posizionamento Tank\n1. Portare il **Tank di Recupero** in posizione.\n\n### 6.2 Collegamento tubo\n2. Agganciare il **tubo rosso** al posto del manometro (sul tubo c'è scritto **Recupero**).\n\n### 6.3 Impostazione manuale\n3. Sul PC mettere **\"LINEA\"** in **MANUALE**.\n\n### 6.4 Apertura valvole\n4. Aprire la **Valvola di Scarico Tank** e la **VALVOLA YV9101**.\n\n### 6.5 Avvio pompa\n5. Accendere la **Pompa** e mettere **SUBITO a 10%** su regolatore.\n\n### 6.6 Aumento velocità\n6. Aumentare regolarmente la velocità della pompa a **20%** e poi a **30%**.\n\n### 6.7 Svuotamento\n7. Quando il Tank è prossimo allo svuotamento, **abbassare gradualmente** la pompa al **10%**.\n\n### 6.8 Ripristino\n8. A Tank vuoto, **ripristinare tutto alla posizione iniziale**.\n\n### 6.9 Rimessa in produzione\n9. Portare il **Tank di Recupero** in Sala Sciroppi e **rimettere in produzione** lo sciroppo.\n\n## 7. ANOMALIE E AZIONI CORRETTIVE\n**Pompa non parte** → verificare che le valvole siano aperte e che la linea sia in MANUALE.\n**Perdite dal tubo rosso** → fermare la pompa, verificare il collegamento al posto del manometro.\n**Vibrazioni anomale della pompa** → ridurre immediatamente la velocità e verificare che il Tank non sia già vuoto.\n\n## 8. NOTE DI SICUREZZA\n⚠️ **Mettere SUBITO la pompa al 10%** all'accensione — non avviare a velocità superiore.\n⚠️ **Abbassare gradualmente** la velocità prima dello svuotamento completo per evitare che la pompa lavori a secco."
  },
  {
    id:'sop_005', title:'RICEVIMENTO AROMI', area:'Sala Infusioni', tipo:'Controllo qualità',
    freq:'Su richiesta / Occasionale', stato:'approvata', date:'26/06/2026', creator:'Silvio Chiaverini',
    content: "## 1. SCOPO\nDefinire la procedura corretta per il ricevimento degli aromi tramite cisterna, inclusi i controlli documentali, qualitativi e le operazioni di scarico.\n\n## 2. CAMPO DI APPLICAZIONE\nSala Infusioni — Area ricevimento cisterne. Si applica ad ogni consegna di aromi via cisterna.\n\n## 3. RIFERIMENTI\nFrequenza: **su richiesta**, ad ogni arrivo cisterna aromi.\n\n## 4. DPI RICHIESTI\n**Imbragatura di sicurezza**\n**Caschetto**\nCalzature antiscivolo\n**Guanti in nitrile**\n\n## 5. MATERIALI E ATTREZZATURE\n2 bicchierini con **tappo BLU** per ogni camera (uno per **Cella Frigorifera**, uno per controllo **Microbiologico**)\nTronchesina per rompere i sigilli\n**Termometro** per misurare la temperatura allo scarico\nFoglio di carico interno\nAccesso al **PC di controllo impianto**\n\n## 6. PROCEDURA OPERATIVA\n\n### 6.1 Controllo documentale\n1. Controllare i documenti e verificare che siano corretti → **Targa Rimorchio** → **Aroma Trasportato** → **Sigilli**.\n\n### 6.2 Documento lavaggio e preparazione\n2. Controllare il **documento lavaggio cisterna** e iniziare a preparare il **documento interno** dove scrivere i dati successivi.\n\n### 6.3 Verifica camere\n3. Verificare quante **camere della cisterna** sono utilizzate (si vede dal documento di carico Ferrero).\n\n### 6.4 Preparazione attrezzatura\n4. Preparare attrezzatura da portare per il prelievo → **2 bicchierini tappo BLU per camera** (uno da mettere in **Cella Frigorifera CF**, l'altro da portare in **Laboratorio** per controllo **Microbiologico MB**) → prendere **tronchesina** per rompere i sigilli → **termometro** per misurare la temperatura al momento dello scarico.\n\n### 6.5 Salita in cisterna e prelievi\n5. Indossare **imbragatura** e **caschetto** → agganciarsi alla **fune salvavita** → salire sulla cisterna → togliere i sigilli e controllarli → misurare la **temperatura** e verificare che sia nel **range specifiche** → fare prelievi per ogni camera piena.\n\n### 6.6 Controlli qualità\n6. Fare i controlli di **Brix** e **pH** e verificare che siano nel range (vedi **foglio di carico interno**).\n\n### 6.7 Selezione Tank Aroma\n7. Andare a pagina **Ricevimento Aromi** → **Comandi Produzione** → selezionare **TANK AROMA** → **Conferma**.\n\n### 6.8 Download aroma\n8. **Scelta Aroma** → **Download** → **Chiudi**.\n\n### 6.9 Conferma data\n9. **Conferma Data** → inserire **Data e Orario di Carico** che si trova nei documenti consegnati dall'autista → **Calcolo Data**.\n\n### 6.10 Messa in produzione Tank\n10. Mettere in **PRODUZIONE** il Tank Aroma che riceve → in alto a SX → **Stoccaggio Produzione** → **Comandi** → **Produzione** → **Start**.\n\n### 6.11 Conferma drenaggio\n11. **Conferma Drenaggio** (**TASTO GIALLO**) perché cambia il drenaggio dell'impianto.\n\n### 6.12 Collegamento tubo e apertura camere\n12. Uscire fuori e collegare il tubo alla cisterna dopo aver scaricato l'acqua al suo interno (**DRENAGGIO**) → far aprire le camere dall'autista → aprire la **valvola di scarico** dove è stato agganciato il tubo.\n\n### 6.13 Avvio scarico\n13. Tornare sulla pagina **Ricevimento Aromi** e premere **START**.\n\n### 6.14 Attivazione esterna\n14. Uscire di nuovo fuori e premere il **tasto verde che lampeggia**.\n\n### 6.15 Svuotamento tubo\n15. A fine carico, **ripetere la procedura di carico per 3 volte** in modo da svuotare il tubo.\n\n### 6.16 Scollegamento e risciacquo\n16. Sganciare il tubo e ricollegarlo all'impianto → cliccare su **CARICO ESEGUITO** → andare su **Ricevimento Aromi** e fare di nuovo la procedura di scarico.\n\n### 6.17 Seconda attivazione esterna\n17. Tornare all'esterno e premere l'altro **tasto verde che lampeggia**.\n\n### 6.18 Chiusura procedura\n18. Terminare la procedura sul **foglio di carico** e su **PERIPASS**.\n\n## 7. ANOMALIE E AZIONI CORRETTIVE\n**Temperatura fuori range** → NON procedere allo scarico, segnalare al responsabile qualità.\n**Brix o pH fuori range** → NON procedere allo scarico, contattare il responsabile qualità per valutazione.\n**Sigilli manomessi o mancanti** → segnalare immediatamente, documentare con foto e contattare il responsabile.\n**Tasto verde non lampeggia** → verificare sul PC che la procedura sia stata avviata correttamente.\n\n## 8. NOTE DI SICUREZZA\n⚠️ **Indossare SEMPRE imbragatura e caschetto** prima di salire sulla cisterna.\n⚠️ **Agganciarsi SEMPRE alla fune salvavita** durante le operazioni in quota.\n⚠️ Scaricare l'acqua di **drenaggio** dal tubo prima di collegarlo alla cisterna."
  }
];

let procedures = SOP_DATA.slice();
let currentPage = 'dashboard';
let editingId = null;
let generatedContent = '';
let currentRole = null;

document.getElementById('hdrDate').textContent = new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function showToast(msg,d=3000){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),d); }
function showPin(){ document.getElementById('pinArea').style.display='block'; document.getElementById('pinInput').focus(); }
function checkPin(){
  if(document.getElementById('pinInput').value===ADMIN_PIN){ loginAs('admin'); }
  else { document.getElementById('pinError').style.display='block'; document.getElementById('pinInput').value=''; }
}
function loginAs(role){
  currentRole=role;
  document.getElementById('loginOverlay').style.display='none';
  const badge=document.getElementById('roleBadge');
  badge.textContent=role==='admin'?'🔐 Amministratore':'👷 Operatore';
  badge.className='role-badge '+(role==='admin'?'admin':'operator');
  document.getElementById('btnNuova').disabled=role!=='admin';

}
function logout(){
  currentRole=null;
  document.getElementById('pinInput').value='';
  document.getElementById('pinError').style.display='none';
  document.getElementById('pinArea').style.display='none';
  document.getElementById('loginOverlay').style.display='flex';
}
function showPage(p){
  currentPage=p;
  document.querySelectorAll('nav > button').forEach((b,i)=>b.classList.toggle('active',['dashboard','procedure'][i]===p));
  if(p==='dashboard') renderDashboard(); else renderProcedure();
}
function md(text){
  if(!text) return '';
  let t=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/^---+\s*$/gm,'').replace(/\n{3,}/g,'\n\n');
  t=t.replace(/^### (.+)$/gm,'<strong style="color:#16a34a;font-size:.95rem">$1</strong>');
  t=t.replace(/^## (.+)$/gm,'<strong style="color:#2563eb;font-size:1rem">$1</strong>');
  t=t.replace(/^# (.+)$/gm,'<strong style="color:#dc2626;font-size:1.05rem">$1</strong>');
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
  return t;
}
function renderDashboard(){
  const total=procedures.length,approvate=procedures.filter(p=>p.stato==='approvata').length,bozze=procedures.filter(p=>p.stato==='bozza').length;
  const inf=procedures.filter(p=>p.area==='Sala Infusioni'),sci=procedures.filter(p=>p.area==='Sala Sciroppi'),com=procedures.filter(p=>p.area==='Comune (entrambe)');
  document.getElementById('mainContent').innerHTML=
    '<div class="stats">'+
    '<div class="stat-card"><div class="num">'+total+'</div><div class="lbl">Totali</div></div>'+
    '<div class="stat-card"><div class="num" style="color:var(--green)">'+approvate+'</div><div class="lbl">Approvate</div></div>'+
    '<div class="stat-card"><div class="num" style="color:#a16207">'+bozze+'</div><div class="lbl">Bozze</div></div>'+
    '<div class="stat-card"><div class="num" style="color:var(--gray)">'+(total-approvate-bozze)+'</div><div class="lbl">Obsolete</div></div>'+
    '</div>'+
    '<div class="area-cards">'+
    '<div class="area-card infusioni"><h3>🫖 Sala Infusioni ('+(inf.length+com.length)+')</h3>'+
    ([...inf,...com].slice(0,8).map(function(p){return '<div class="proc-mini" onclick="openDetail(\''+p.id+'\')"><span>'+p.title+'</span><span class="badge '+p.stato+'">'+p.stato+'</span></div>';}).join('')||'<p style="color:var(--gray);font-size:.83rem;padding:8px 0">Nessuna procedura</p>')+
    '</div>'+
    '<div class="area-card sciroppi"><h3>🍯 Sala Sciroppi ('+(sci.length+com.length)+')</h3>'+
    ([...sci,...com].slice(0,8).map(function(p){return '<div class="proc-mini" onclick="openDetail(\''+p.id+'\')"><span>'+p.title+'</span><span class="badge '+p.stato+'">'+p.stato+'</span></div>';}).join('')||'<p style="color:var(--gray);font-size:.83rem;padding:8px 0">Nessuna procedura</p>')+
    '</div></div>';
}
function renderProcedure(filter,areaFilter){
  filter=filter||''; areaFilter=areaFilter||'';
  var filtered=procedures.filter(function(p){
    var mt=!filter||p.title.toLowerCase().indexOf(filter.toLowerCase())>=0||(p.content&&p.content.toLowerCase().indexOf(filter.toLowerCase())>=0);
    var ma=!areaFilter||p.area===areaFilter;
    return mt&&ma;
  });
  var isAdmin=currentRole==='admin';
  var html='<div class="toolbar">'+
    '<input id="searchInput" placeholder="🔍 Cerca…" oninput="renderProcedure(this.value,document.getElementById(\'areaFilter\').value)" value="'+filter+'">'+
    '<select id="areaFilter" onchange="renderProcedure(document.getElementById(\'searchInput\').value,this.value)">'+
    '<option value="">Tutte le aree</option><option>Sala Infusioni</option><option>Sala Sciroppi</option><option value="Comune (entrambe)">Comune</option></select>';
  if(isAdmin) html+='<button class="btn-new" onclick="openNewModal()">➕ Nuova SOP</button>';
  html+='</div><div class="proc-table"><div class="proc-row header"><span>Titolo</span><span>Area</span><span>Tipo</span><span>Stato</span><span></span></div>';
  if(filtered.length===0){ html+='<div style="padding:24px;text-align:center;color:var(--gray)">Nessuna procedura</div>'; }
  else { filtered.forEach(function(p){
    html+='<div class="proc-row" onclick="openDetail(\''+p.id+'\')"><div><div class="proc-title">'+p.title+'</div><div class="proc-date">📅 '+p.date+' · '+p.creator+'</div></div><span class="proc-area" style="font-size:.8rem;color:var(--gray)">'+p.area+'</span><span class="proc-tipo" style="font-size:.8rem;color:var(--gray)">'+p.tipo+'</span><span class="badge '+p.stato+'">'+p.stato+'</span><div onclick="event.stopPropagation()">'+(isAdmin?'<button class="btn-icon" onclick="openEditModal(\''+p.id+'\')">✏️</button><button class="btn-icon" onclick="deleteProc(\''+p.id+'\')">🗑️</button>':'—')+'</div></div>';
  }); }
  html+='</div>';
  document.getElementById('mainContent').innerHTML=html;
}
function openNewModal(){
  if(currentRole!=='admin') return;
  editingId=null; generatedContent='';
  document.getElementById('modalTitle').textContent='Nuova Procedura Operativa';
  document.getElementById('fTitle').value='';document.getElementById('fDesc').value='';
  document.getElementById('fStato').value='bozza';
  document.getElementById('aiResult').style.display='none';document.getElementById('aiResult').innerHTML='';
  document.getElementById('sopModal').classList.add('open');
}
function openEditModal(id){
  if(currentRole!=='admin') return;
  var p=procedures.find(function(x){return x.id===id;}); if(!p) return;
  editingId=id; generatedContent=p.content;
  document.getElementById('modalTitle').textContent='Modifica Procedura';
  document.getElementById('fTitle').value=p.title;
  document.getElementById('fArea').value=p.area;
  document.getElementById('fTipo').value=p.tipo;
  document.getElementById('fFreq').value=p.freq||'Ogni turno';
  document.getElementById('fDesc').value=p.desc||'';
  document.getElementById('fStato').value=p.stato;
  var el=document.getElementById('aiResult');
  el.innerHTML=p.content?md(p.content):''; el.style.display=p.content?'block':'none';
  document.getElementById('sopModal').classList.add('open');
}
function closeModal(){ document.getElementById('sopModal').classList.remove('open'); }
async function generateSOP(){
  var title=document.getElementById('fTitle').value.trim(), desc=document.getElementById('fDesc').value.trim();
  if(!title&&!desc){ alert('Inserisci titolo o descrizione.'); return; }
  var btn=document.getElementById('btnGenerate');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Generazione…';
  try {
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,messages:[{role:'user',content:'Sei un esperto di procedure operative in uno stabilimento di imbottigliamento di bevande (Estathè). Genera una SOP professionale per: TITOLO: '+(title||'da determinare')+' | AREA: '+document.getElementById('fArea').value+' | TIPO: '+document.getElementById('fTipo').value+' | DESCRIZIONE: '+(desc||'—')+'. Sezioni obbligatorie: ## 1. SCOPO / ## 2. CAMPO DI APPLICAZIONE / ## 3. RIFERIMENTI / ## 4. DPI RICHIESTI / ## 5. MATERIALI E ATTREZZATURE / ## 6. PROCEDURA OPERATIVA / ## 7. PUNTI DI CONTROLLO / ## 8. ANOMALIE E AZIONI CORRETTIVE / ## 9. NOTE DI SICUREZZA. Usa ## per titoli sezione, ### per sottosezioni, **grassetto** per valori critici. Non usare ---.'}]})});
    var data=await res.json();
    generatedContent=data.content?data.content.map(function(b){return b.text||'';}).join(''):'';
    var el=document.getElementById('aiResult');
    el.innerHTML=md(generatedContent); el.style.display='block';
  } catch(e){ alert('Errore AI. Riprova.'); }
  btn.disabled=false; btn.innerHTML='✨ Rigenera SOP con AI';
}
function saveSOP(){
  var title=document.getElementById('fTitle').value.trim();
  if(!title){ alert('Inserisci il titolo.'); return; }
  if(!generatedContent&&!editingId){ alert('Genera prima la SOP con AI.'); return; }
  var now=new Date().toLocaleDateString('it-IT');
  if(editingId){
    var idx=procedures.findIndex(function(p){return p.id===editingId;});
    procedures[idx]=Object.assign({},procedures[idx],{title:title,area:document.getElementById('fArea').value,tipo:document.getElementById('fTipo').value,freq:document.getElementById('fFreq').value,desc:document.getElementById('fDesc').value,stato:document.getElementById('fStato').value,content:generatedContent||procedures[idx].content});
  } else {
    procedures.unshift({id:'sop_'+Date.now(),title:title,area:document.getElementById('fArea').value,tipo:document.getElementById('fTipo').value,freq:document.getElementById('fFreq').value,desc:document.getElementById('fDesc').value,stato:document.getElementById('fStato').value,content:generatedContent,date:now,creator:CREATOR});
  }
  showToast('✅ Procedura salvata!');
  closeModal(); showPage(currentPage);
}
function openDetail(id){
  var p=procedures.find(function(x){return x.id===id;}); if(!p) return;
  var isAdmin=currentRole==='admin';
  document.getElementById('detailContent').innerHTML=
    '<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn-chiudi" onclick="closeDetail()">✕ Chiudi</button></div>'+
    '<div class="detail-header"><h2>'+p.title+'</h2><span class="badge '+p.stato+'" style="font-size:.85rem;padding:4px 12px">'+p.stato+'</span></div>'+
    '<div class="detail-meta"><span>📍 <strong>'+p.area+'</strong></span><span>🔧 <strong>'+p.tipo+'</strong></span><span>🔁 <strong>'+(p.freq||'—')+'</strong></span><span>📅 <strong>'+p.date+'</strong></span><span>👤 <strong>'+p.creator+'</strong></span></div>'+
    '<div class="sop-content">'+md(p.content)+'</div>'+
    '<div class="detail-actions">'+(isAdmin?'<button class="btn-del" onclick="deleteProc(\''+p.id+'\');closeDetail()">🗑️ Elimina</button><button class="btn-edit" onclick="closeDetail();openEditModal(\''+p.id+'\')">✏️ Modifica</button>':'')+
    '<button class="btn-print" onclick="printSOP()">🖨️ Stampa</button><button class="btn-chiudi" onclick="closeDetail()">✕ Chiudi</button></div>';
  document.getElementById('detailModal').classList.add('open');
  setTimeout(function(){ document.querySelector('#detailModal .modal').scrollTop = 0; }, 50);
}
function closeDetail(){ document.getElementById('detailModal').classList.remove('open'); }
function printSOP(){ window.print(); }
function deleteProc(id){
  if(currentRole!=='admin') return;
  if(!confirm('Eliminare questa procedura?')) return;
  procedures=procedures.filter(function(p){return p.id!==id;});
  showPage(currentPage);
}
